<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apolo Disc Dog Arcade 👾</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { pixel: ['VT323', 'monospace'] },
                    colors: {
                        retro: {
                            bg: '#FAFAF9', dark: '#1C1917',
                            blue: '#3B82F6', gold: '#EAB308',
                            green: '#22C55E', red: '#e63946',
                            cabinet: '#d62828'
                        }
                    },
                    boxShadow: { 'pixel': '6px 6px 0px 0px rgba(0, 0, 0, 0.8)' }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #111827; 
            background-image: radial-gradient(circle at center, #1f2937 0%, #030712 100%);
            color: #FAFAF9;
            touch-action: none;
            overflow-x: hidden;
        }
        
        .arcade-cabinet {
            background-color: #d62828;
            box-shadow: 
                inset -10px -10px 30px rgba(0,0,0,0.4),
                inset 10px 10px 30px rgba(255,255,255,0.1),
                0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 1024px;
            margin: 0 auto;
            background-color: #1C1917;
            box-shadow: inset 0 0 40px rgba(0,0,0,1);
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            image-rendering: pixelated;
            background-color: #87CEEB;
            border-radius: 12px;
        }
        
        .glass-glare {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 40%);
            border-radius: 12px;
            pointer-events: none;
            z-index: 10;
        }

        #share-btn {
            display: none;
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
        }
    </style>
</head>
<body class="antialiased flex flex-col items-center justify-start md:justify-center min-h-screen p-0 md:p-8 selection:bg-retro-gold">

    <!-- Máquina Arcade -->
    <div class="arcade-cabinet w-full max-w-6xl md:rounded-t-[3rem] md:rounded-b-xl border-0 md:border-8 border-red-900 p-2 md:p-8 flex flex-col items-center mt-0 relative min-h-screen md:min-h-0">
        
        <!-- Marquesina Iluminada -->
        <div class="w-full bg-black border-2 md:border-4 border-gray-800 p-2 md:p-4 mb-2 md:mb-8 rounded-lg shadow-[0_0_20px_rgba(250,204,21,0.5)] text-center relative overflow-hidden flex flex-col items-center justify-center">
            <div class="absolute inset-0 bg-yellow-400 opacity-10 animate-pulse"></div>
            <h1 class="font-pixel text-2xl md:text-6xl text-yellow-400 uppercase tracking-widest drop-shadow-[0_0_10px_rgba(250,204,21,0.8)] relative z-10 m-0 leading-none" style="text-shadow: 2px 2px 0px #1C1917;">
                APOLO DISC DOG ARCADE 👾
            </h1>
            <p class="font-pixel text-sm md:text-2xl text-red-400 mt-1 md:mt-2 relative z-10 tracking-widest" style="text-shadow: 1px 1px 0px #1C1917;">¡ATRAPA Y ESQUIVA!</p>
        </div>

        <!-- Pantalla de la Máquina -->
        <div id="game-container" class="p-2 md:p-8 rounded-xl md:rounded-[2rem] border-b-4 md:border-b-8 border-r-4 md:border-r-8 border-l-2 md:border-l-4 border-t-2 md:border-t-4 border-gray-900 relative flex-grow md:flex-grow-0 flex items-center justify-center">
            <div class="glass-glare mx-2 md:mx-8 mt-2 md:mt-8"></div>
            
            <!-- Botón de compartir en Instagram -->
            <button id="share-btn" onclick="shareToInstagram()" class="font-pixel bg-pink-600 hover:bg-pink-500 text-white px-6 py-3 rounded-full border-b-4 border-pink-900 shadow-lg transform active:translate-y-1 transition-all text-xl md:text-3xl uppercase tracking-wider">
                📸 COMPARTE TU PUNTUACIÓN EN INSTAGRAM
            </button>

            <!-- El canvas del juego -->
            <canvas id="gameCanvas" width="800" height="600" class="border-2 md:border-4 border-black relative z-0"></canvas>
        </div>

        <!-- Panel de Control -->
        <div class="w-full mt-2 md:mt-8 bg-red-800 border-t-2 md:border-t-4 border-l-2 border-r-2 border-red-950 p-2 md:p-6 rounded-b-xl flex flex-col md:flex-row justify-between items-center shadow-[inset_0_10px_20px_rgba(0,0,0,0.5)] z-20">
            <div class="text-left font-pixel text-yellow-100 text-xs md:text-xl space-y-1 md:space-y-2 mb-2 md:mb-0 w-full md:w-auto text-center md:text-left">
                <p>🕹️ <strong>PC:</strong> Usa <kbd class="bg-gray-800 text-white px-1 py-0.5 md:px-2 md:py-1 rounded border-b-2 md:border-b-4 border-gray-950">Izq</kbd> / <kbd class="bg-gray-800 text-white px-1 py-0.5 md:px-2 md:py-1 rounded border-b-2 md:border-b-4 border-gray-950">Der</kbd></p>
                <p class="mt-1 md:mt-2">👆 <strong>Móvil:</strong> Toca la pantalla y arrastra</p>
            </div>

            <div class="flex gap-2 md:gap-6 justify-center">
                <div class="w-8 h-8 md:w-16 md:h-16 bg-blue-500 rounded-full border-b-2 md:border-b-4 border-blue-800 shadow-[0_5px_10px_rgba(0,0,0,0.5)] active:border-b-0 active:translate-y-1 transition-all cursor-pointer"></div>
                <div class="w-8 h-8 md:w-16 md:h-16 bg-yellow-400 rounded-full border-b-2 md:border-b-4 border-yellow-700 shadow-[0_5px_10px_rgba(0,0,0,0.5)] active:border-b-0 active:translate-y-1 transition-all cursor-pointer"></div>
                <div class="w-10 h-10 md:w-20 md:h-20 bg-green-500 rounded-full border-b-2 md:border-b-4 border-green-800 shadow-[0_5px_10px_rgba(0,0,0,0.5)] active:border-b-0 active:translate-y-1 transition-all cursor-pointer"></div>
            </div>
        </div>
        
        <div class="flex gap-8 md:gap-16 mt-4 md:mt-8 pb-2 md:pb-4 justify-center">
            <div class="w-10 h-14 md:w-14 md:h-20 bg-gray-800 border-2 md:border-4 border-gray-600 rounded flex flex-col items-center p-1 shadow-inner relative">
                <div class="w-1 h-6 md:w-2 md:h-10 bg-black rounded-full mb-1 md:mb-2 border border-gray-700"></div>
                <div class="w-6 h-2 md:w-8 md:h-4 bg-red-600 rounded-sm animate-pulse border border-red-900 shadow-[0_0_5px_#ef4444]"></div>
                <div class="absolute -bottom-6 md:-bottom-8 text-xs md:text-sm font-pixel text-yellow-300 opacity-50">25¢</div>
            </div>
            <div class="w-10 h-14 md:w-14 md:h-20 bg-gray-800 border-2 md:border-4 border-gray-600 rounded flex flex-col items-center p-1 shadow-inner relative">
                <div class="w-1 h-6 md:w-2 md:h-10 bg-black rounded-full mb-1 md:mb-2 border border-gray-700"></div>
                <div class="w-6 h-2 md:w-8 md:h-4 bg-red-600 rounded-sm animate-pulse border border-red-900 shadow-[0_0_5px_#ef4444]"></div>
                <div class="absolute -bottom-6 md:-bottom-8 text-xs md:text-sm font-pixel text-yellow-300 opacity-50">25¢</div>
            </div>
        </div>
    </div>

    <!-- Contenedor para mensajes tipo modal -->
    <div id="message-box" class="fixed inset-0 bg-black bg-opacity-80 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-gray-900 border-4 border-retro-cyan p-6 rounded-xl max-w-sm w-full text-center">
            <p id="message-text" class="font-pixel text-xl md:text-2xl text-white mb-6"></p>
            <button onclick="closeMessageBox()" class="font-pixel bg-retro-blue text-white px-6 py-2 rounded-lg border-b-4 border-blue-900 active:border-b-0 uppercase">Entendido</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const shareBtn = document.getElementById('share-btn');
        const messageBox = document.getElementById('message-box');
        const messageText = document.getElementById('message-text');

        const GAME_WIDTH = 800;
        const GAME_HEIGHT = 600;
        const DOG_SIZE = 200; 
        const ITEM_SIZE = 70; 
        
        const RUTA_IMAGEN_PERRO = 'image_836c6d.jpg'; 
        const RUTA_IMAGEN_FONDO = 'image_8436e3.png'; 
        const RUTA_IMAGEN_SHARE = 'image_933f5e.jpg'; // Nueva imagen Cyberpunk para compartir
        
        let gameState = 'START'; 
        let score = 0;
        let lives = 3;
        let frames = 0;
        let items = [];
        let difficultyMultiplier = 1;
        const BASE_PLAYER_SPEED = 8;

        const apoloImg = new Image();
        let isApoloLoaded = false;
        apoloImg.onload = () => { isApoloLoaded = true; };
        apoloImg.src = RUTA_IMAGEN_PERRO;

        const bgImg = new Image();
        let isBgLoaded = false;
        bgImg.onload = () => { isBgLoaded = true; };
        bgImg.src = RUTA_IMAGEN_FONDO;

        const shareApoloImg = new Image();
        let isShareImgLoaded = false;
        shareApoloImg.onload = () => { isShareImgLoaded = true; };
        shareApoloImg.src = RUTA_IMAGEN_SHARE;

        const player = {
            x: GAME_WIDTH / 2 - DOG_SIZE / 2,
            y: GAME_HEIGHT - DOG_SIZE - 20,
            width: DOG_SIZE,
            height: DOG_SIZE,
            speed: BASE_PLAYER_SPEED,
            stunTimer: 0,
            emoji: '🐶'
        };

        const itemTypes = [
            { type: 'normal', emoji: '🥏', points: 10, prob: 0.45, speed: 4 },
            { type: 'chicken', emoji: '🍗', points: 20, prob: 0.15, speed: 5 },
            { type: 'meat',   emoji: '🍖', points: 30, prob: 0.1, speed: 6 },
            { type: 'bone',   emoji: '🦴', points: 100, prob: 0.05, speed: 8, addsLife: true }, 
            { type: 'bee',    emoji: '🐝', points: -15, prob: 0.15, speed: 5 },
            { type: 'fly',    emoji: '🪰', points: -10, prob: 0.1, speed: 6 }
        ];

        const keys = { ArrowLeft: false, ArrowRight: false, a: false, d: false };

        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = true;
            if (e.key === ' ' || e.key === 'Enter') {
                if (gameState === 'START' || gameState === 'GAMEOVER') startGame();
            }
        });
        window.addEventListener('keyup', (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = false; });

        function handlePointerMove(e) {
            if (gameState !== 'PLAYING') return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            let clientX = e.clientX;
            if (e.touches && e.touches.length > 0) { clientX = e.touches[0].clientX; }
            const scaleX = canvas.width / rect.width;
            let targetX = (clientX - rect.left) * scaleX;
            player.x = targetX - player.width / 2;
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > GAME_WIDTH) player.x = GAME_WIDTH - player.width;
        }

        canvas.addEventListener('mousedown', (e) => {
            if (gameState === 'START' || gameState === 'GAMEOVER') startGame();
            else handlePointerMove(e);
        });
        canvas.addEventListener('mousemove', (e) => { if (e.buttons > 0) handlePointerMove(e); });
        canvas.addEventListener('touchstart', (e) => {
            if (gameState === 'START' || gameState === 'GAMEOVER') startGame();
            else handlePointerMove(e);
        }, {passive: false});
        canvas.addEventListener('touchmove', handlePointerMove, {passive: false});

        function startGame() {
            gameState = 'PLAYING';
            score = 0;
            lives = 3;
            items = [];
            frames = 0;
            difficultyMultiplier = 1;
            player.x = GAME_WIDTH / 2 - player.width / 2;
            player.stunTimer = 0;
            player.speed = BASE_PLAYER_SPEED;
            shareBtn.style.display = 'none'; 
        }

        function showMessage(text) {
            messageText.innerText = text;
            messageBox.classList.remove('hidden');
        }

        function closeMessageBox() {
            messageBox.classList.add('hidden');
        }

        async function shareToInstagram() {
            try {
                // Crear un canvas para el pantallazo con la imagen de alta calidad
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = 1024; // Resolución un poco más alta para que se vea bien
                tempCanvas.height = 1024;
                const tCtx = tempCanvas.getContext('2d');

                // 1. Dibujar la imagen Cyberpunk como fondo
                if (isShareImgLoaded) {
                    // Mantener aspecto y centrar
                    const scale = Math.max(tempCanvas.width / shareApoloImg.width, tempCanvas.height / shareApoloImg.height);
                    const x = (tempCanvas.width / 2) - (shareApoloImg.width / 2) * scale;
                    const y = (tempCanvas.height / 2) - (shareApoloImg.height / 2) * scale;
                    tCtx.drawImage(shareApoloImg, x, y, shareApoloImg.width * scale, shareApoloImg.height * scale);
                } else {
                    tCtx.fillStyle = '#111827';
                    tCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
                }

                // 2. Superposición para el record (Degradado inferior de neón)
                const gradient = tCtx.createLinearGradient(0, tempCanvas.height * 0.7, 0, tempCanvas.height);
                gradient.addColorStop(0, 'rgba(0,0,0,0)');
                gradient.addColorStop(0.5, 'rgba(230, 57, 70, 0.7)'); // Rojo Arcade
                gradient.addColorStop(1, 'rgba(0,0,0,0.9)');
                tCtx.fillStyle = gradient;
                tCtx.fillRect(0, tempCanvas.height * 0.7, tempCanvas.width, tempCanvas.height * 0.3);
                
                // 3. Texto del Record
                tCtx.fillStyle = '#EAB308'; // Oro
                tCtx.shadowColor = 'rgba(0,0,0,1)';
                tCtx.shadowBlur = 10;
                tCtx.font = 'bold 80px "VT323", monospace';
                tCtx.textAlign = 'center';
                tCtx.fillText(`RECORD: ${score} PUNTOS`, tempCanvas.width / 2, tempCanvas.height - 130);
                
                // 4. Etiqueta @apolo.chilote
                tCtx.fillStyle = '#FFFFFF';
                tCtx.font = '50px "VT323", monospace';
                tCtx.fillText('@apolo.chilote 👾', tempCanvas.width / 2, tempCanvas.height - 60);

                tempCanvas.toBlob(async (blob) => {
                    if (!blob) return;
                    const file = new File([blob], "apolo_cyber_record.png", { type: "image/png" });
                    
                    if (navigator.share) {
                        await navigator.share({
                            files: [file],
                            title: 'Apolo Cyber Record',
                            text: `¡Mira mi récord de ${score} puntos en Apolo Arcade! @apolo.chilote`
                        });
                    } else {
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = 'record_apolo.png';
                        a.click();
                        showMessage("¡Tarjeta de récord descargada! Súbela a Instagram Stories y etiqueta a @apolo.chilote");
                    }
                });
            } catch (err) {
                console.error(err);
                showMessage("Ups, no se pudo generar la tarjeta. Intenta de nuevo.");
            }
        }

        function spawnItem() {
            difficultyMultiplier = 1 + (score / 800) + (frames / 4000); 
            let spawnRate = Math.max(18, 85 - (score / 12) - (frames / 300)); 
            player.speed = BASE_PLAYER_SPEED + (difficultyMultiplier - 1) * 2;

            if (frames % Math.floor(spawnRate) === 0) {
                const rand = Math.random();
                let cumulativeProb = 0;
                let selectedType = itemTypes[0];

                for (let type of itemTypes) {
                    cumulativeProb += type.prob;
                    if (rand <= cumulativeProb) {
                        selectedType = type;
                        break;
                    }
                }

                items.push({
                    x: Math.random() * (GAME_WIDTH - ITEM_SIZE),
                    y: -ITEM_SIZE,
                    width: ITEM_SIZE,
                    height: ITEM_SIZE,
                    type: selectedType.type,
                    emoji: selectedType.emoji,
                    points: selectedType.points,
                    speed: selectedType.speed * difficultyMultiplier,
                    addsLife: selectedType.addsLife || false
                });
            }
        }

        function checkCollision(rect1, rect2) {
            const margin = 15;
            return (
                rect1.x + margin < rect2.x + rect2.width - margin &&
                rect1.x + rect1.width - margin > rect2.x + margin &&
                rect1.y + margin < rect2.y + rect2.height - margin &&
                rect1.y + rect1.height - margin > rect2.y + margin
            );
        }

        function update() {
            if (gameState !== 'PLAYING') return;
            frames++;

            if (player.stunTimer > 0) {
                player.stunTimer--;
            } else {
                if (keys.ArrowLeft || keys.a) player.x -= player.speed;
                if (keys.ArrowRight || keys.d) player.x += player.speed;
            }

            if (player.x < 0) player.x = 0;
            if (player.x + player.width > GAME_WIDTH) player.x = GAME_WIDTH - player.width;

            spawnItem();

            for (let i = items.length - 1; i >= 0; i--) {
                let item = items[i];
                item.y += item.speed;

                if (checkCollision(player, item)) {
                    if (item.type === 'bee' || item.type === 'fly') {
                        player.stunTimer = 60;
                        score += item.points; 
                        lives--; 
                        if (lives <= 0) endGame();
                    } else {
                        score += item.points;
                        if (item.addsLife) {
                            lives++;
                            if (lives > 5) lives = 5; 
                        }
                    }
                    items.splice(i, 1);
                    continue;
                }

                if (item.y > GAME_HEIGHT) {
                    if (item.type === 'normal') {
                        lives--;
                        if (lives <= 0) endGame();
                    }
                    items.splice(i, 1);
                }
            }
        }

        function endGame() {
            gameState = 'GAMEOVER';
            shareBtn.style.display = 'block'; 
        }

        function drawEnvironmentTo(targetCtx) {
            if (isBgLoaded) {
                targetCtx.drawImage(bgImg, 0, 0, GAME_WIDTH, GAME_HEIGHT);
            } else {
                targetCtx.fillStyle = '#87CEEB';
                targetCtx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
                targetCtx.fillStyle = '#EAB308';
                targetCtx.fillRect(GAME_WIDTH - 120, 40, 80, 80);
                targetCtx.fillStyle = '#4ADE80';
                targetCtx.fillRect(0, GAME_HEIGHT - 60, GAME_WIDTH, 60);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawEnvironmentTo(ctx);
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            if (gameState === 'PLAYING') {
                if (player.stunTimer > 0 && Math.floor(frames / 5) % 2 === 0) {
                    ctx.fillStyle = 'rgba(239, 68, 68, 0.3)';
                    ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
                }

                ctx.font = `${ITEM_SIZE}px sans-serif`;
                items.forEach(item => {
                    ctx.fillText(item.emoji, item.x + item.width/2, item.y + item.height/2);
                });

                if (isApoloLoaded) {
                    ctx.drawImage(apoloImg, player.x, player.y, player.width, player.height);
                    if (player.stunTimer > 0) {
                        ctx.font = '40px sans-serif';
                        ctx.fillText('😵', player.x + player.width/2, player.y - 10);
                    }
                } else {
                    ctx.font = `${DOG_SIZE * 0.8}px sans-serif`;
                    ctx.fillText(player.stunTimer > 0 ? '😵' : player.emoji, player.x + player.width/2, player.y + player.height/2);
                }

                ctx.font = '30px "VT323"';
                ctx.fillStyle = '#1C1917';
                ctx.textAlign = 'left';
                ctx.fillText(`PUNTOS: ${score}`, 20, 40);
                ctx.textAlign = 'right';
                ctx.fillText(`VIDAS: ${'🦴'.repeat(Math.max(0, lives))}`, GAME_WIDTH - 20, 40);

            } else if (gameState === 'START') {
                ctx.fillStyle = 'rgba(28, 25, 23, 0.85)';
                ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
                ctx.textAlign = 'center';
                ctx.fillStyle = '#EAB308';
                ctx.font = '60px "VT323"';
                ctx.fillText('APOLO DISC DOG ARCADE 👾', GAME_WIDTH / 2, GAME_HEIGHT / 2 - 80);
                ctx.fillStyle = '#FAFAF9';
                ctx.font = '30px "VT323"';
                if (Math.floor(Date.now() / 500) % 2 === 0) {
                    ctx.fillText('TOCA LA PANTALLA O PRESIONA ESPACIO', GAME_WIDTH / 2, GAME_HEIGHT / 2);
                }
                ctx.font = '24px "VT323"';
                ctx.fillStyle = '#9CA3AF';
                ctx.fillText('Atrapa: 🥏 (+10) 🍗 (+20) 🍖 (+30)', GAME_WIDTH / 2, GAME_HEIGHT / 2 + 70);
                ctx.fillStyle = '#FFD700';
                ctx.fillText('¡RARO! 🦴 (+100 y +1 Vida)', GAME_WIDTH / 2, GAME_HEIGHT / 2 + 105);
                ctx.fillStyle = '#F87171';
                ctx.fillText('Esquiva: 🐝 🪰 (Pierdes 1 🦴 y puntos)', GAME_WIDTH / 2, GAME_HEIGHT / 2 + 140);
                ctx.fillStyle = '#FAFAF9';
                ctx.fillText('¡CUIDADO! El juego se acelera con el tiempo ⚡', GAME_WIDTH / 2, GAME_HEIGHT / 2 + 175);

            } else if (gameState === 'GAMEOVER') {
                ctx.fillStyle = 'rgba(239, 68, 68, 0.9)';
                ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
                ctx.textAlign = 'center';
                ctx.fillStyle = '#FAFAF9';
                ctx.font = '70px "VT323"';
                ctx.fillText('¡GAME OVER! 🕹️', GAME_WIDTH / 2, GAME_HEIGHT / 2 - 80);
                ctx.fillStyle = '#EAB308';
                ctx.font = '40px "VT323"';
                ctx.fillText(`PUNTUACIÓN FINAL: ${score}`, GAME_WIDTH / 2, GAME_HEIGHT / 2 - 10);
                ctx.fillStyle = '#FAFAF9';
                ctx.font = '30px "VT323"';
                if (Math.floor(Date.now() / 500) % 2 === 0) {
                    ctx.fillText('TOCA PARA REINICIAR', GAME_WIDTH / 2, GAME_HEIGHT / 2 + 140);
                }
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
