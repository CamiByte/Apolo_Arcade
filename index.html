<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apolo Disc Dog Arcade 👾</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { pixel: ['VT323', 'monospace'] },
                    colors: {
                        retro: {
                            bg: '#FAFAF9', dark: '#1C1917',
                            blue: '#3B82F6', gold: '#EAB308',
                            green: '#22C55E', red: '#e63946',
                            cabinet: '#d62828'
                        }
                    },
                    boxShadow: { 'pixel': '6px 6px 0px 0px rgba(0, 0, 0, 0.8)' }
                }
            }
        }
    </script>
    <style>
        body {
            /* Fondo de la sala arcade */
            background-color: #111827; 
            background-image: radial-gradient(circle at center, #1f2937 0%, #030712 100%);
            color: #FAFAF9;
            touch-action: none; /* Evita el scroll al jugar en móvil */
            overflow-x: hidden;
        }
        
        /* Contenedor del Mueble Arcade */
        .arcade-cabinet {
            background-color: #d62828; /* Rojo clásico */
            box-shadow: 
                inset -10px -10px 30px rgba(0,0,0,0.4),
                inset 10px 10px 30px rgba(255,255,255,0.1),
                0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }

        /* Pantalla CRT (Bisel) */
        #game-container {
            position: relative;
            width: 100%;
            max-width: 1024px; /* Pantalla más grande (antes 800px) */
            margin: 0 auto;
            background-color: #1C1917; /* Bisel oscuro */
            box-shadow: inset 0 0 40px rgba(0,0,0,1); /* Sombra interna para dar profundidad */
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            image-rendering: pixelated;
            background-color: #87CEEB; /* Color cielo base */
            border-radius: 12px; /* Ligeramente curvo como CRT */
        }
        
        /* Reflejo del cristal */
        .glass-glare {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 40%);
            border-radius: 12px;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body class="antialiased flex flex-col items-center justify-start md:justify-center min-h-screen p-0 md:p-8 selection:bg-retro-gold">

    <!-- Máquina Arcade -->
    <!-- Se ajustaron los bordes y paddings para móviles: p-2 en vez de p-4, bordes 0 en móvil -->
    <div class="arcade-cabinet w-full max-w-6xl md:rounded-t-[3rem] md:rounded-b-xl border-0 md:border-8 border-red-900 p-2 md:p-8 flex flex-col items-center mt-0 relative min-h-screen md:min-h-0">
        
        <!-- Marquesina Iluminada (Letrero Superior) -->
        <div class="w-full bg-black border-2 md:border-4 border-gray-800 p-2 md:p-4 mb-2 md:mb-8 rounded-lg shadow-[0_0_20px_rgba(250,204,21,0.5)] text-center relative overflow-hidden flex flex-col items-center justify-center">
            <div class="absolute inset-0 bg-yellow-400 opacity-10 animate-pulse"></div>
            <h1 class="font-pixel text-2xl md:text-6xl text-yellow-400 uppercase tracking-widest drop-shadow-[0_0_10px_rgba(250,204,21,0.8)] relative z-10 m-0 leading-none" style="text-shadow: 2px 2px 0px #1C1917;">
                APOLO DISC DOG ARCADE 👾
            </h1>
            <p class="font-pixel text-sm md:text-2xl text-red-400 mt-1 md:mt-2 relative z-10 tracking-widest" style="text-shadow: 1px 1px 0px #1C1917;">¡ATRAPA Y ESQUIVA!</p>
        </div>

        <!-- Pantalla de la Máquina -->
        <div id="game-container" class="p-2 md:p-8 rounded-xl md:rounded-[2rem] border-b-4 md:border-b-8 border-r-4 md:border-r-8 border-l-2 md:border-l-4 border-t-2 md:border-t-4 border-gray-900 relative flex-grow md:flex-grow-0 flex items-center justify-center">
            <div class="glass-glare mx-2 md:mx-8 mt-2 md:mt-8"></div> <!-- Ajuste para no cubrir el borde del div -->
            <!-- El canvas del juego -->
            <canvas id="gameCanvas" width="800" height="600" class="border-2 md:border-4 border-black relative z-0"></canvas>
        </div>

        <!-- Panel de Control (Botones e Instrucciones) -->
        <div class="w-full mt-2 md:mt-8 bg-red-800 border-t-2 md:border-t-4 border-l-2 border-r-2 border-red-950 p-2 md:p-6 rounded-b-xl flex flex-col md:flex-row justify-between items-center shadow-[inset_0_10px_20px_rgba(0,0,0,0.5)] z-20">
            
            <!-- Instrucciones -->
            <div class="text-left font-pixel text-yellow-100 text-xs md:text-xl space-y-1 md:space-y-2 mb-2 md:mb-0 w-full md:w-auto text-center md:text-left">
                <p>🕹️ <strong>PC:</strong> Usa <kbd class="bg-gray-800 text-white px-1 py-0.5 md:px-2 md:py-1 rounded border-b-2 md:border-b-4 border-gray-950">Izq</kbd> / <kbd class="bg-gray-800 text-white px-1 py-0.5 md:px-2 md:py-1 rounded border-b-2 md:border-b-4 border-gray-950">Der</kbd></p>
                <p class="mt-1 md:mt-2">👆 <strong>Móvil:</strong> Toca la pantalla y arrastra</p>
            </div>

            <!-- Botones Arcade (Decorativos) -->
            <div class="flex gap-2 md:gap-6 justify-center">
                <div class="w-8 h-8 md:w-16 md:h-16 bg-blue-500 rounded-full border-b-2 md:border-b-4 border-blue-800 shadow-[0_5px_10px_rgba(0,0,0,0.5)] active:border-b-0 active:translate-y-1 transition-all cursor-pointer"></div>
                <div class="w-8 h-8 md:w-16 md:h-16 bg-yellow-400 rounded-full border-b-2 md:border-b-4 border-yellow-700 shadow-[0_5px_10px_rgba(0,0,0,0.5)] active:border-b-0 active:translate-y-1 transition-all cursor-pointer"></div>
                <div class="w-10 h-10 md:w-20 md:h-20 bg-green-500 rounded-full border-b-2 md:border-b-4 border-green-800 shadow-[0_5px_10px_rgba(0,0,0,0.5)] active:border-b-0 active:translate-y-1 transition-all cursor-pointer"></div>
            </div>
        </div>
        
        <!-- Ranuras de Monedas (Coin Slots) -->
        <div class="flex gap-8 md:gap-16 mt-4 md:mt-8 pb-2 md:pb-4 justify-center">
            <div class="w-10 h-14 md:w-14 md:h-20 bg-gray-800 border-2 md:border-4 border-gray-600 rounded flex flex-col items-center p-1 shadow-inner relative">
                <div class="w-1 h-6 md:w-2 md:h-10 bg-black rounded-full mb-1 md:mb-2 border border-gray-700"></div>
                <div class="w-6 h-2 md:w-8 md:h-4 bg-red-600 rounded-sm animate-pulse border border-red-900 shadow-[0_0_5px_#ef4444]"></div>
                <div class="absolute -bottom-6 md:-bottom-8 text-xs md:text-sm font-pixel text-yellow-300 opacity-50">25¢</div>
            </div>
            <div class="w-10 h-14 md:w-14 md:h-20 bg-gray-800 border-2 md:border-4 border-gray-600 rounded flex flex-col items-center p-1 shadow-inner relative">
                <div class="w-1 h-6 md:w-2 md:h-10 bg-black rounded-full mb-1 md:mb-2 border border-gray-700"></div>
                <div class="w-6 h-2 md:w-8 md:h-4 bg-red-600 rounded-sm animate-pulse border border-red-900 shadow-[0_0_5px_#ef4444]"></div>
                <div class="absolute -bottom-6 md:-bottom-8 text-xs md:text-sm font-pixel text-yellow-300 opacity-50">25¢</div>
            </div>
        </div>

    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Constantes del juego
        const GAME_WIDTH = 800;
        const GAME_HEIGHT = 600;
        const DOG_SIZE = 200; // Tamaño aumentado para que el perro sea más grande
        const ITEM_SIZE = 70; // Tamaño de los iconos aumentado (antes 40)
        
        // --- CONFIGURACIÓN DE IMÁGENES ---
        // Nombres exactos de las imágenes que deben estar en la misma carpeta
        const RUTA_IMAGEN_PERRO = 'image_836c6d.jpg'; 
        const RUTA_IMAGEN_FONDO = 'image_8436e3.png'; 
        // -------------------------------
        
        // Estado del juego
        let gameState = 'START'; // START, PLAYING, GAMEOVER
        let score = 0;
        let lives = 3;
        let frames = 0;
        let items = [];
        let difficultyMultiplier = 1;

        // Cargar la imagen del perro
        const apoloImg = new Image();
        let isApoloLoaded = false;
        let imageError = false;

        apoloImg.onload = () => {
            isApoloLoaded = true;
        };
        apoloImg.onerror = () => {
            imageError = true;
            console.warn("No se pudo cargar la imagen de Apolo. Mostrando emoji de respaldo.");
        };
        apoloImg.src = RUTA_IMAGEN_PERRO;

        // Cargar la imagen del fondo
        const bgImg = new Image();
        let isBgLoaded = false;
        bgImg.onload = () => {
            isBgLoaded = true;
        };
        bgImg.onerror = () => {
            console.warn("No se pudo cargar el fondo. Mostrando paisaje por defecto.");
        }
        bgImg.src = RUTA_IMAGEN_FONDO;

        // Definición del Jugador (Apolo)
        const player = {
            x: GAME_WIDTH / 2 - DOG_SIZE / 2,
            y: GAME_HEIGHT - DOG_SIZE - 20, // Posición sobre el césped
            width: DOG_SIZE,
            height: DOG_SIZE,
            speed: 8,
            stunTimer: 0,
            emoji: '🐶'
        };

        // Tipos de objetos que caen
        const itemTypes = [
            { type: 'normal', emoji: '🥏', points: 10, prob: 0.7, speed: 4 },
            { type: 'golden', emoji: '🌟', points: 50, prob: 0.1, speed: 7 },
            { type: 'bee',   emoji: '🐝', points: -15, prob: 0.2, speed: 5 } // Penalización
        ];

        // Controles
        const keys = {
            ArrowLeft: false,
            ArrowRight: false,
            a: false,
            d: false
        };

        // Listeners de Teclado
        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = true;
            if (e.key === ' ' || e.key === 'Enter') {
                if (gameState === 'START' || gameState === 'GAMEOVER') startGame();
            }
        });
        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = false;
        });

        // Listeners Táctiles / Ratón
        function handlePointerMove(e) {
            if (gameState !== 'PLAYING') return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            let clientX = e.clientX;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
            }
            // Mapear posición X del cliente a la resolución interna del canvas
            const scaleX = canvas.width / rect.width;
            let targetX = (clientX - rect.left) * scaleX;
            
            // Centrar a Apolo en el dedo/ratón
            player.x = targetX - player.width / 2;
            
            // Limitar bordes
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > GAME_WIDTH) player.x = GAME_WIDTH - player.width;
        }

        canvas.addEventListener('mousedown', (e) => {
            if (gameState === 'START' || gameState === 'GAMEOVER') startGame();
            else handlePointerMove(e);
        });
        canvas.addEventListener('mousemove', (e) => {
            if (e.buttons > 0) handlePointerMove(e); // Solo si mantiene presionado
        });
        canvas.addEventListener('touchstart', (e) => {
            if (gameState === 'START' || gameState === 'GAMEOVER') startGame();
            else handlePointerMove(e);
        }, {passive: false});
        canvas.addEventListener('touchmove', handlePointerMove, {passive: false});

        function startGame() {
            gameState = 'PLAYING';
            score = 0;
            lives = 3;
            items = [];
            frames = 0;
            difficultyMultiplier = 1;
            player.x = GAME_WIDTH / 2 - player.width / 2;
            player.stunTimer = 0;
        }

        function spawnItem() {
            // Aumentar dificultad
            difficultyMultiplier = 1 + (score / 500); // 10% más rápido cada 50 puntos
            
            // Probabilidad de spawn (más alto = más ítems)
            let spawnRate = Math.max(30, 80 - (score / 10)); // Empieza cada ~80 frames, baja hasta 30

            if (frames % Math.floor(spawnRate) === 0) {
                const rand = Math.random();
                let cumulativeProb = 0;
                let selectedType = itemTypes[0];

                for (let type of itemTypes) {
                    cumulativeProb += type.prob;
                    if (rand <= cumulativeProb) {
                        selectedType = type;
                        break;
                    }
                }

                items.push({
                    x: Math.random() * (GAME_WIDTH - ITEM_SIZE),
                    y: -ITEM_SIZE,
                    width: ITEM_SIZE,
                    height: ITEM_SIZE,
                    type: selectedType.type,
                    emoji: selectedType.emoji,
                    points: selectedType.points,
                    speed: selectedType.speed * difficultyMultiplier
                });
            }
        }

        function checkCollision(rect1, rect2) {
            // Hitbox un poco más pequeña que el tamaño visual para ser más permisivos
            const margin = 10;
            return (
                rect1.x + margin < rect2.x + rect2.width - margin &&
                rect1.x + rect1.width - margin > rect2.x + margin &&
                rect1.y + margin < rect2.y + rect2.height - margin &&
                rect1.y + rect1.height - margin > rect2.y + margin
            );
        }

        function update() {
            if (gameState !== 'PLAYING') return;
            frames++;

            // Manejo de Apolo (Aturdimiento y Movimiento Teclado)
            if (player.stunTimer > 0) {
                player.stunTimer--;
            } else {
                if (keys.ArrowLeft || keys.a) player.x -= player.speed;
                if (keys.ArrowRight || keys.d) player.x += player.speed;
            }

            // Limitar a los bordes
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > GAME_WIDTH) player.x = GAME_WIDTH - player.width;

            spawnItem();

            // Actualizar ítems
            for (let i = items.length - 1; i >= 0; i--) {
                let item = items[i];
                item.y += item.speed;

                // Colisión con Apolo
                if (checkCollision(player, item)) {
                    if (item.type === 'bee') {
                        player.stunTimer = 60; // Aturdido 1 segundo (a 60fps)
                        score += item.points; // Resta puntos
                        lives--; // NUEVO: Pierde una vida
                        if (lives <= 0) {
                            gameState = 'GAMEOVER';
                        }
                    } else {
                        score += item.points;
                    }
                    items.splice(i, 1);
                    continue;
                }

                // Si el ítem cae al suelo
                if (item.y > GAME_HEIGHT) {
                    // Si era un disco (no una abeja), pierdes una vida
                    if (item.type !== 'bee') {
                        lives--;
                        if (lives <= 0) {
                            gameState = 'GAMEOVER';
                        }
                    }
                    items.splice(i, 1);
                }
            }
        }

        function drawEnvironment() {
            if (isBgLoaded) {
                // Dibujar el paisaje de fondo si cargó correctamente
                ctx.drawImage(bgImg, 0, 0, GAME_WIDTH, GAME_HEIGHT);
            } else {
                // Cielo original como respaldo
                ctx.fillStyle = '#87CEEB';
                ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

                // Sol retro
                ctx.fillStyle = '#EAB308';
                ctx.fillRect(GAME_WIDTH - 120, 40, 80, 80);

                // Nubes simples rectangulares
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.fillRect(100, 80, 120, 30);
                ctx.fillRect(130, 60, 60, 20);
                
                ctx.fillRect(500, 120, 150, 40);
                ctx.fillRect(530, 90, 80, 30);

                // Césped (Fondo)
                ctx.fillStyle = '#4ADE80';
                ctx.fillRect(0, GAME_HEIGHT - 60, GAME_WIDTH, 60);
                // Césped (Detalles oscuros)
                ctx.fillStyle = '#22C55E';
                ctx.fillRect(0, GAME_HEIGHT - 30, GAME_WIDTH, 30);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawEnvironment();

            // Configuración general de texto para Emojis
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            if (gameState === 'PLAYING') {
                // Flash rojo si está aturdido
                if (player.stunTimer > 0 && Math.floor(frames / 5) % 2 === 0) {
                    ctx.fillStyle = 'rgba(239, 68, 68, 0.3)';
                    ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
                }

                // Dibujar Items
                ctx.font = `${ITEM_SIZE}px sans-serif`;
                items.forEach(item => {
                    ctx.fillText(item.emoji, item.x + item.width/2, item.y + item.height/2);
                });

                // Dibujar Jugador
                if (isApoloLoaded) {
                    // Se quitó el efecto 'multiply' para que Apolo no se vea transparente
                    ctx.drawImage(apoloImg, player.x, player.y, player.width, player.height);
                    
                    if (player.stunTimer > 0) {
                        ctx.font = '40px sans-serif';
                        ctx.fillText('😵', player.x + player.width/2, player.y - 10);
                    }
                } else {
                    // Si no, se dibuja el emoji como respaldo
                    ctx.font = `${DOG_SIZE * 0.8}px sans-serif`;
                    if (player.stunTimer > 0) {
                        // Cara mareada si está aturdido
                        ctx.fillText('😵', player.x + player.width/2, player.y + player.height/2);
                    } else {
                        ctx.fillText(player.emoji, player.x + player.width/2, player.y + player.height/2);
                    }
                }

                // Dibujar UI (Puntuación y Vidas)
                ctx.font = '30px "VT323"';
                ctx.fillStyle = '#1C1917';
                ctx.textAlign = 'left';
                ctx.fillText(`PUNTOS: ${score}`, 20, 40);

                ctx.textAlign = 'right';
                let vidasStr = '🦴'.repeat(Math.max(0, lives));
                ctx.fillText(`VIDAS: ${vidasStr}`, GAME_WIDTH - 20, 40);

            } else if (gameState === 'START') {
                // Pantalla de Inicio
                ctx.fillStyle = 'rgba(28, 25, 23, 0.8)';
                ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

                ctx.textAlign = 'center';
                ctx.fillStyle = '#EAB308';
                ctx.font = '60px "VT323"';
                ctx.fillText('APOLO DISC DOG ARCADE 👾', GAME_WIDTH / 2, GAME_HEIGHT / 2 - 50);

                ctx.fillStyle = '#FAFAF9';
                ctx.font = '30px "VT323"';
                // Efecto parpadeo
                if (Math.floor(Date.now() / 500) % 2 === 0) {
                    ctx.fillText('TOCA LA PANTALLA O PRESIONA ESPACIO', GAME_WIDTH / 2, GAME_HEIGHT / 2 + 30);
                }
                
                ctx.font = '24px "VT323"';
                ctx.fillStyle = '#9CA3AF';
                ctx.fillText('Atrapa: 🥏 (+10)  🌟 (+50)', GAME_WIDTH / 2, GAME_HEIGHT / 2 + 100);
                ctx.fillText('Esquiva: 🐝 (Pierdes 1 🦴 y -15 pts)', GAME_WIDTH / 2, GAME_HEIGHT / 2 + 140);
                ctx.fillText('Pierdes una 🦴 si un disco toca el suelo', GAME_WIDTH / 2, GAME_HEIGHT / 2 + 180);

            } else if (gameState === 'GAMEOVER') {
                // Pantalla de Game Over
                ctx.fillStyle = 'rgba(239, 68, 68, 0.9)'; // Fondo rojizo
                ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

                ctx.textAlign = 'center';
                ctx.fillStyle = '#FAFAF9';
                ctx.font = '70px "VT323"';
                ctx.fillText('¡JUEGO TERMINADO!', GAME_WIDTH / 2, GAME_HEIGHT / 2 - 40);

                ctx.fillStyle = '#EAB308';
                ctx.font = '40px "VT323"';
                ctx.fillText(`PUNTUACIÓN FINAL: ${score}`, GAME_WIDTH / 2, GAME_HEIGHT / 2 + 20);

                ctx.fillStyle = '#FAFAF9';
                ctx.font = '30px "VT323"';
                if (Math.floor(Date.now() / 500) % 2 === 0) {
                    ctx.fillText('TOCA O PRESIONA ESPACIO PARA REINTENTAR', GAME_WIDTH / 2, GAME_HEIGHT / 2 + 90);
                }
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Iniciar bucle
        gameLoop();

    </script>
</body>
</html>
